- name: "Install nvidia"
  kewlfft.aur.aur:
    use: "yay"
    name: "nvidia-390xx-dkms"
    state: "present"
  tags:
    - install
    - nvidia

- name: "Install bumblebee"
  kewlfft.aur.aur:
    use: "yay"
    name: "bumblebee"
    state: "present"
  tags:
    - install
    - nvidia

- name: "Copy nvidia config"
  ansible.builtin.file:
    src: "$PWD/xorg.conf.nvidia"
    dest: "/etc/bumblebee/xorg.conf.nvidia"
    state: "hard"
    force: true
  tags:
    - install
    - nvidia


