- hosts: localhost
  pre_tasks:
  - name: Grant access to pacman and yay to do whatever without root access
    ansible.builtin.shell:
      cmd: 'echo "$USER ALL=(ALL) NOPASSWD:/usr/bin/yay,/usr/bin/pacman" > /tmp/110-grant-pacman-yay'
    tags:
      - install

  - name: Copy access file
    become: true
    ansible.builtin.copy:
      src: '/tmp/110-grant-pacman-yay'
      dest: '/etc/sudoers.d/110-grant-pacman-yay'
    tags:
      - install

  post_tasks:
  - name: "Revoke access of pacman and yay"
    become: true
    ansible.builtin.file:
      path: /etc/sudoers.d/11-grant-pacman-yay
      state: absent
    tags:
      - install

  tasks:
    - import_tasks: ansible/networkmanager.yml
    - import_tasks: ansible/ssh.yml
    - import_tasks: ansible/utilities.yml

    - import_tasks: ansible/kitty.yml
    # - import_tasks: ansible/wezterm.yml
    # - import_tasks: ansible/alacritty.yml

    - import_tasks: ansible/fish.yml
    - import_tasks: ansible/fzf.yml
    - import_tasks: ansible/git.yml
    - import_tasks: ansible/neovim.yml
    - import_tasks: ansible/starship.yml
    - import_tasks: ansible/docker.yml

    - import_tasks: ansible/tmux.yml
    # - import_tasks: ansible/zellij.yml

    - import_tasks: ansible/yazi.yml
    # - import_tasks: ansible/ranger.yml

    - import_tasks: ansible/hyprland.yml
    # - import_tasks: ansible/sway.yml

    - import_tasks: ansible/rofi.yml
    - import_tasks: ansible/wm.yml
    - import_tasks: ansible/sddm.yml
    - import_tasks: ansible/waybar.yml
    - import_tasks: ansible/clipboard.yml

    - import_tasks: ansible/golang.yml
    - import_tasks: ansible/nodejs.yml

    # - import_tasks: ansible/nvidia.yml
    - import_tasks: ansible/scripts.yml
    - import_tasks: ansible/bluetooth.yml
    - import_tasks: ansible/services.yml

    - import_tasks: ansible/fonts.yml
    - import_tasks: ansible/bitwarden.yml
    - import_tasks: ansible/vlc.yml
